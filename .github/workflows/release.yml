name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release — must match manifest.json (e.g. 0.1.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: version must be semver (e.g. 0.1.0)"
            exit 1
          fi

      - name: Verify manifest.json matches input version
        run: |
          MANIFEST_VERSION=$(python3 -c "
          import json
          with open('custom_components/openadr_ven/manifest.json') as f:
              print(json.load(f)['version'])
          ")
          echo "manifest.json version: $MANIFEST_VERSION"
          echo "Input version:         ${{ inputs.version }}"
          if [ "$MANIFEST_VERSION" != "${{ inputs.version }}" ]; then
            echo "ERROR: manifest.json says $MANIFEST_VERSION but input is ${{ inputs.version }}"
            echo "Bump the version in manifest.json via a PR first, then run this workflow."
            exit 1
          fi

      - name: Tag and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            --verify-tag
