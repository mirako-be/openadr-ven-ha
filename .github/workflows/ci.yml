name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install openleadr==0.6.5 ruff pytest pytest-homeassistant-custom-component

      - name: Lint (ruff)
        run: ruff check custom_components/

      - name: Import check
        run: python -c "import custom_components.openadr_ven"
